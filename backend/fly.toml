# Distill API on Fly.io — https://fly.io/docs/reference/configuration/
#
# Secrets: fly secrets set … (never commit keys; .env is not in the Docker image).
# Logging: REQUEST_LOG_STDOUT=1 (see docs/LOGGING.md).

app = 'distill-api'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'off'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
